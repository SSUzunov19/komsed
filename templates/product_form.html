{% extends "base.html" %}
{% block title %}Добави продукт{% endblock %}
{% block content %}
<h2>+ Добави продукт</h2>
<div class="card p-4 mt-3" style="max-width:600px">
<form method="POST">
    <div class="mb-3"><label class="form-label">Име</label><input name="name" class="form-control" required></div>
    <div class="mb-3"><label class="form-label">SKU</label><input name="sku" class="form-control" required></div>
    <div class="row"><div class="col-md-6 mb-3"><label class="form-label">Цена</label><input name="price" type="number" step="0.01" class="form-control" required></div>
    <div class="col-md-6 mb-3"><label class="form-label">Промо цена</label><input name="promo_price" type="number" step="0.01" class="form-control"></div></div>
    <div class="row"><div class="col-md-6 mb-3"><label class="form-label">Наличност</label><input name="qty" type="number" class="form-control" value="0" required></div>
    <div class="col-md-6 mb-3"><label class="form-label">Марка</label><input name="brand" class="form-control"></div></div>
    <div class="mb-3 form-check"><input name="is_active" type="checkbox" value="1" checked class="form-check-input"><label class="form-check-label">Активен</label></div>
    <button class="btn btn-success">Запази</button> <a href="/products" class="btn btn-secondary">Отказ</a>
</form>
</div>
{% endblock %}
